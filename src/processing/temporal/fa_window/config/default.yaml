fa_window:
  ros__parameters:
    input_topic: "fa_window/input"
    output_topic: "fa_window/output"
    input_stream_id: "audio/buffered/mic"

    output:
      stream_id: "audio/windowed/mic"

    window:
      type: "hann"
      expected_frames: 512
      strict_frame_count: true

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
