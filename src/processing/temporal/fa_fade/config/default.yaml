fa_fade:
  ros__parameters:
    input_topic: "fa_fade/input"
    output_topic: "fa_fade/output"
    input_stream_id: "audio/buffered/mic"

    output:
      stream_id: "audio/faded/mic"

    fade:
      mode: "fade_in"
      duration_frames: 16000
      initial_position_frames: 0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
