fa_trim:
  ros__parameters:
    input_topic: "fa_trim/input"
    output_topic: "fa_trim/output"
    input_stream_id: "audio/windowed/mic"

    output:
      stream_id: "audio/trimmed/mic"

    trim:
      leading_frames: 16
      trailing_frames: 16

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
