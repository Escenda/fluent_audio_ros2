fa_delay:
  ros__parameters:
    input_topic: "fa_delay/input"
    output_topic: "fa_delay/output"
    input_stream_id: "audio/buffered/mic"

    output:
      stream_id: "audio/delayed/mic"

    delay:
      ms: 250.0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
