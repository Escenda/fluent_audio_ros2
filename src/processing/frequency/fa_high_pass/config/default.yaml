fa_high_pass:
  ros__parameters:
    input_topic: "audio/resample16k/mic"
    output_topic: "audio/high_pass/mic"

    filter:
      cutoff_hz: 80.0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
