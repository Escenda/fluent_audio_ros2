fa_deesser:
  ros__parameters:
    input_topic: "audio/normalized/mic"
    output_topic: "audio/deessed/mic"

    detector:
      cutoff_hz: 4500.0
      threshold: 0.08
      attenuation_db: -9.0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: true

    diagnostics:
      publish_period_ms: 1000
