fa_eq:
  ros__parameters:
    input_topic: "fa_eq/input"
    output_topic: "fa_eq/output"
    input_stream_id: "audio/sample_format/mic"
    output:
      stream_id: "audio/eq/mic"

    low:
      cutoff_hz: 250.0

    high:
      cutoff_hz: 4000.0

    gains:
      low_db: 0.0
      mid_db: 0.0
      high_db: 0.0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
