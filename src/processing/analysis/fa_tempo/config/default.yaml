fa_tempo:
  ros__parameters:
    input_topic: "audio/features/input"
    output_topic: "audio/features/tempo"
    backend.name: "internal_onset_autocorrelation"
    expected.sample_rate: 16000
    expected.channels: 1
    expected.encoding: "FLOAT32LE"
    expected.bit_depth: 32
    expected.layout: "interleaved"
    feature.n_fft: 400
    feature.hop_length: 160
    feature.method: "onset_autocorrelation"
    tempo.bpm_min: 60.0
    tempo.bpm_max: 180.0
    tempo.confidence_threshold: 0.2
    qos.depth: 10
    qos.reliable: false
