fa_asr:
  ros__parameters:
    audio_topic: "audio/frame"
    vad_topic: "voice/vad_state"
    turn_context_topic: "conversation/turn_context"
    asr_result_topic: "voice/asr/result"

    target_sample_rate: 16000
    min_audio_sec: 0.3
    silence_timeout_sec: 10.0
    finalize_on_vad_end: true
    finalize_on_context_inactive: true
    workspace_dir: "/tmp/fa_asr"
    cleanup_audio_files: true

    # Supported backend.name values:
    # - local_command: generic local ASR process, requires backend.model_path
    # - whisper_cpp: whisper.cpp process, requires backend.model_path
    # - parakeet_worker: external worker/process/container, requires backend.model
    # - openai_realtime: external OpenAI Realtime worker/process, requires backend.model
    #
    # OpenAI SDK/API clients are not imported by fa_asr. The openai_realtime
    # backend is an external worker boundary and fails closed if command/model
    # are not explicitly configured.
    backend.name: ""
    backend.model: ""
    backend.command: ""
    backend.model_path: ""
    backend.language: "ja"
    backend.timeout_sec: 120.0
    backend.working_directory: ""
    backend.args: []
    backend.output_text_path: ""
