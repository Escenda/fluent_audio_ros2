fa_channel_convert:
  ros__parameters:
    input_topic: "audio/sample_format/mic"
    output_topic: "audio/channel_converted/mic"

    input:
      channels: 1

    output:
      channels: 2

    conversion:
      mode: "mono_to_stereo_duplicate"

    expected:
      sample_rate: 16000
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
