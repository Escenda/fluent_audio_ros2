fa_bit_depth:
  ros__parameters:
    input_topic: "fa_bit_depth/input"
    output_topic: "fa_bit_depth/output"
    input_stream_id: "audio/raw/mic"

    input:
      encoding: "PCM16LE"
      bit_depth: 16

    output:
      stream_id: "audio/bit_depth/mic"
      encoding: "PCM32LE"
      bit_depth: 32

    expected:
      sample_rate: 16000
      channels: 1
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
