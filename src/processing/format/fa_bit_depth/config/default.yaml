fa_bit_depth:
  ros__parameters:
    input_topic: "audio/frame"
    output_topic: "audio/bit_depth/mic"

    input:
      encoding: "PCM16LE"
      bit_depth: 16

    output:
      encoding: "PCM32LE"
      bit_depth: 32

    expected:
      sample_rate: 16000
      channels: 1
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
