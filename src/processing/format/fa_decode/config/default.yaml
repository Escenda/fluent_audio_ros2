fa_decode:
  ros__parameters:
    backend.name: "external_codec_decoder"
    backend.command.executable: ""
    backend.command.arguments: []
    backend.command.timeout_ms: 3000
    backend.command.max_output_bytes: 1048576

    input_topic: "audio/encoded/mic"
    output_topic: "audio/pcm16/mic"

    input:
      codec: "opus"
      container: "ogg"
      payload_format: "ogg_page"
      sample_rate: 16000
      channels: 1

    output:
      sample_rate: 16000
      channels: 1
      encoding: "PCM16LE"
      bit_depth: 16
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
