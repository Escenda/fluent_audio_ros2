fa_interleave:
  ros__parameters:
    input_topic: "fa_interleave/input"
    output_topic: "fa_interleave/output"
    input_stream_id: "audio/sample_format/mic"

    input:
      layout: "interleaved"

    output:
      stream_id: "audio/layout_reordered/mic"
      layout: "planar"

    expected:
      sample_rate: 16000
      channels: 2
      encoding: "FLOAT32LE"
      bit_depth: 32

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
