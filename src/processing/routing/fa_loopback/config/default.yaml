fa_loopback:
  ros__parameters:
    input_topic: "fa_loopback/input"
    output_topic: "fa_loopback/output"
    input_stream_id: "audio/output/frame"
    output:
      stream_id: "audio/loopback/frame"

    expected:
      sample_rate: 48000
      channels: 1
      encoding: "PCM16LE"
      bit_depth: 16
      layout: "interleaved"

    qos:
      depth: 10
      reliable: true

    diagnostics:
      qos:
        depth: 10
        reliable: false
      publish_period_ms: 1000
