fa_ducking:
  ros__parameters:
    program_topic: "fa_ducking/program"
    sidechain_topic: "fa_ducking/sidechain"
    output_topic: "fa_ducking/output"
    program_stream_id: "audio/program/frame"
    sidechain_stream_id: "audio/sidechain/frame"

    output:
      stream_id: "audio/ducked/frame"

    sidechain:
      threshold_rms: 0.05
      max_age_ms: 100

    ducking:
      gain_db: -12.0
      attack_ms: 10.0
      release_ms: 250.0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      qos:
        depth: 10
        reliable: false
      publish_period_ms: 1000
