fa_patchbay:
  ros__parameters:
    input_topics:
      - "fa_patchbay/input"
    input_stream_ids:
      - "audio/patchbay/input"
    output_topics:
      - "fa_patchbay/output"
    output_stream_ids:
      - "audio/patchbay/output"

    expected:
      sample_rate: 48000
      channels: 1
      encoding: "PCM16LE"
      bit_depth: 16
      layout: "interleaved"

    qos:
      depth: 10
      reliable: true

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
