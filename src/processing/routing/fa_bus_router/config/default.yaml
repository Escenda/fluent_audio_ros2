fa_bus_router:
  ros__parameters:
    input_topic: "fa_bus_router/input"
    output_topics:
      - "fa_bus_router/output"
    input_stream_id: "audio/routing/input"
    output:
      stream_ids:
        - "audio/routing/output"

    expected:
      sample_rate: 48000
      channels: 1
      encoding: "PCM16LE"
      bit_depth: 16
      layout: "interleaved"

    qos:
      depth: 10
      reliable: true

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
