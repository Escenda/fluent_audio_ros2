fa_gain:
  ros__parameters:
    input_topic: "fa_gain/input"
    output_topic: "fa_gain/output"
    input_stream_id: "audio/resample16k/mic"

    output:
      stream_id: "audio/gain/mic"

    gain:
      linear: 1.0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
