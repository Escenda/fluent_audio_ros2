fa_noise_gate:
  ros__parameters:
    input_topic: "audio/dc_offset_removed/mic"
    output_topic: "audio/noise_gated/mic"

    gate:
      threshold_linear: 0.02
      closed_gain_linear: 0.0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
