fa_normalize:
  ros__parameters:
    input_topic: "fa_normalize/input"
    output_topic: "fa_normalize/output"
    input_stream_id: "audio/noise_gated/mic"
    output:
      stream_id: "audio/normalized/mic"

    normalize:
      target_peak_linear: 0.9
      silence_threshold_linear: 0.0001

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      qos:
        depth: 10
        reliable: false
      publish_period_ms: 1000
