fa_expander:
  ros__parameters:
    input_topic: "fa_expander/input"
    output_topic: "fa_expander/output"
    input_stream_id: "audio/noise_gated/mic"

    output:
      stream_id: "audio/expanded/mic"

    expander:
      threshold_linear: 0.05
      ratio: 2.0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      qos:
        depth: 10
        reliable: false
      publish_period_ms: 1000
