fa_aec_nn:
  ros__parameters:
    enabled: true
    # Required. Use "passthrough" only for explicit wiring/debug validation.
    backend.name: ""

    input_topic: "audio/aec_linear/frame"
    output_topic: "audio/aec/frame"

    expected_sample_rate: 16000
    expected_channels: 1
    expected:
      encoding: "PCM16LE"
      bit_depth: 16

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
