fa_aec_linear:
  ros__parameters:
    enabled: true

    mic_topic: "audio/resample16k/mic"
    ref_topic: "audio/resample16k/ref"
    output_topic: "audio/aec_linear/frame"
    mic_stream_id: "audio/mic/resample16k"
    ref_stream_id: "audio/ref/resample16k"
    output:
      stream_id: "audio/aec_linear/output"

    expected_sample_rate: 16000
    expected_channels: 1
    expected:
      encoding: "PCM16LE"
      bit_depth: 16

    ref_timeout_ms: 200
    reference_failure_policy: "drop"
    cancel_gain: 1.0

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
