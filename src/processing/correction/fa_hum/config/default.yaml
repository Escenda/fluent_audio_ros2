fa_hum:
  ros__parameters:
    input_topic: "fa_hum/input"
    output_topic: "fa_hum/output"
    input_stream_id: "audio/dc_offset_removed/mic"
    output:
      stream_id: "audio/hum_removed/mic"

    hum:
      frequency_hz: 60.0
      harmonics: 4
      q: 30.0

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
