fa_frame_buffer:
  ros__parameters:
    input_topic: "audio/noise_gated/mic"
    output_topic: "audio/buffered/mic"

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    buffering:
      frames_per_chunk: 512
      max_buffered_chunks: 4

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
