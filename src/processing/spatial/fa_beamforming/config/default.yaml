fa_beamforming:
  ros__parameters:
    input_topic: "fa_beamforming/input"
    output_topic: "fa_beamforming/output"
    input_stream_id: "audio/spatial/mic"

    beamforming:
      weights: [1.0, 0.0, 0.0, 0.0]

    expected:
      sample_rate: 16000
      channels: 4
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    output:
      channels: 1
      stream_id: "audio/beamformed/mic"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
