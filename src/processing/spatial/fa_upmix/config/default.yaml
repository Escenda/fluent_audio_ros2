fa_upmix:
  ros__parameters:
    input_topic: "fa_upmix/input"
    output_topic: "fa_upmix/output"
    input_stream_id: "audio/mono/mic/raw"

    expected:
      sample_rate: 16000
      input_channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    output:
      stream_id: "audio/upmixed/mic/processed"
      channels: 2

    mode: "mono_duplicate"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
