fa_downmix:
  ros__parameters:
    input_topic: "fa_downmix/input"
    output_topic: "fa_downmix/output"
    input_stream_id: "audio/spatial/mic"

    expected:
      sample_rate: 16000
      input_channels: 4
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    output:
      channels: 2
      stream_id: "audio/downmixed/mic"

    mode: "pair_average_to_stereo"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
