fa_turn_detector:
  ros__parameters:
    audio_topic: "audio/frame"
    expected_stream_id: "audio/raw/mic"
    vad_topic: "voice/vad_state"
    turn_context_topic: "conversation/turn_context"
    output_topic: "voice/turn_end"
    # Required. Must match AudioFrame.source_id from the configured fa_in/source pipeline.
    expected_source_id: ""
    # Required backend id. Empty means startup fails closed until launch/profile config selects one.
    backend.name: ""
    # Required. Set an explicit model path in launch/system config.
    backend.model_path: ""
    # Required ONNX Runtime provider, e.g. CPUExecutionProvider or CUDAExecutionProvider.
    backend.execution_provider: ""
    # Required. External worker command. Example: smart_turn_onnx_worker.
    backend.command: ""
    # Required worker args for inference. Must include {audio}, {model}, {provider}.
    # Example: ["detect", "--model", "{model}", "--provider", "{provider}", "--audio", "{audio}"]
    backend.args: []
    # Required startup health-check args. Must include {model}, {provider}.
    # Example: ["health", "--model", "{model}", "--provider", "{provider}"]
    backend.health_args: []
    backend.timeout_sec: 5.0
    backend.workspace_dir: "/tmp/fluent_audio_fa_turn_detector"
    backend.cleanup_audio_files: true
    backend.threshold: 0.5

    # QoS is explicit per edge. Do not infer reliability/depth from topic names.
    audio.qos.depth: 10
    audio.qos.reliable: false
    vad.qos.depth: 10
    vad.qos.reliable: false
    turn_context.qos.depth: 10
    turn_context.qos.reliable: true
    output.qos.depth: 10
    output.qos.reliable: true
