fa_asr:
  ros__parameters:
    audio_topic: "audio/frame"
    turn_context_topic: "conversation/turn_context"
    asr_result_topic: "voice/asr/result"
    asr_state_topic: "voice/asr/state"
    asr_event_topic: "voice/asr/event"
    transcribe_service_name: "transcribe_audio"
    # Required. Must match AudioFrame.source_id from the configured fa_in/source pipeline.
    expected_source_id: ""
    # Required. Must match AudioFrame.stream_id from the configured processing pipeline.
    expected_stream_id: ""

    target_sample_rate: 16000
    min_audio_sec: 0.3
    timeline.retention_sec: 1800.0
    timeline.timestamp_alignment_tolerance_ms: 1.0
    timeline.clock: "media"
    timeline.window_id: "fa_asr_rolling_asr_window"
    timeline.window_epoch: 0
    silence_timeout_sec: 10.0
    control.default_enabled: false
    control.inputs: ["speech_control"]
    control.speech_control.action: "topic"
    control.speech_control.topic: "voice/vad_state"
    control.speech_control.msg_type: "fa_interfaces/msg/VadState"
    control.speech_control.source_id: ""
    control.speech_control.stream_id: ""
    control.speech_control.active_field: "is_speech"
    control.speech_control.start_field: "start"
    control.speech_control.end_field: "end"
    control.speech_control.open_on: "start_or_active_rising"
    control.speech_control.close_on: "end_or_active_falling"
    control.speech_control.submit_on_close: true
    control.speech_control.pre_roll_ms: 0.0
    control.speech_control.post_roll_ms: 0.0
    control.speech_control.qos.depth: 50
    control.speech_control.qos.reliable: false
    finalize_on_context_inactive: true
    workspace_dir: "/tmp/fa_asr"
    cleanup_audio_files: true
    trace.enabled: false
    trace.path: ""

    # Supported backend.name values:
    # - local_command: generic local ASR process, requires backend.model_path
    # - whisper.cpp: whisper.cpp process, requires backend.model_path
    # - parakeet_worker: external worker/process/container, requires backend.model
    # - nemo_rnnt_streaming: external JSONL streaming worker/process/container,
    #   requires backend.command and a local backend.model_path .nemo file
    # - openai_realtime: external OpenAI Realtime worker/process, requires backend.model
    #   and backend.openai_realtime.api_key_env
    # - openai_transcriptions: external OpenAI Transcriptions worker/process, requires
    #   backend.model and backend.openai_transcriptions.api_key_env
    #
    # OpenAI SDK/API clients are not imported by fa_asr. OpenAI backends are
    # external worker boundaries and fail closed if command/model are not
    # explicitly configured.
    backend.name: ""
    backend.kind: "asr"
    backend.model: ""
    backend.command: ""
    backend.model_path: ""
    backend.model_version: ""
    backend.model_revision: ""
    backend.openai_realtime.api_key_env: ""
    backend.openai_transcriptions.api_key_env: ""
    backend.language: "ja"
    backend.timeout_sec: 120.0
    backend.working_directory: ""
    backend.args: []
    backend.health_args: []
    backend.output_text_path: ""
    backend.result_format: ""
    backend.sample_rate_hz: 16000
    backend.channels: 1
    backend.chunk_size_samples: 1600
    # chunk_ms is not accepted by nemo_rnnt_streaming yet; set chunk_size_samples explicitly.
    backend.chunk_ms: 0
    backend.emit_partial: true
    backend.max_partial_interval_ms: 300

    # QoS is explicit per edge. Do not infer reliability/depth from topic names.
    audio.qos.depth: 20
    audio.qos.reliable: false
    turn_context.qos.depth: 10
    turn_context.qos.reliable: true
    result.qos.depth: 10
    result.qos.reliable: true
    observability.qos.depth: 50
    observability.qos.reliable: true
