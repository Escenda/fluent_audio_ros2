fa_kws:
  ros__parameters:
    audio_topic: "audio/frame"
    expected_stream_id: "audio/raw/mic"
    output_topic: "voice/wake_word"
    # Required. Must match AudioFrame.source_id from the configured fa_in/source pipeline.
    expected_source_id: ""
    # Required backend id. Empty means startup fails closed until launch/profile config selects one.
    backend.name: ""

    target_sample_rate: 16000
    cooldown_ms: 1500
    audio.qos.depth: 10
    audio.qos.reliable: false
    output.qos.depth: 10
    output.qos.reliable: false

    # Local sherpa-onnx KWS model files. These are required; fa_kws fails closed
    # at startup if any path is empty or missing.
    model.encoder: ""
    model.decoder: ""
    model.joiner: ""
    model.tokens: ""
    kws.keywords_file: ""

    model.num_threads: 4
    # Required sherpa-onnx provider: cpu, cuda, or coreml. Empty means startup fails closed.
    backend.execution_provider: ""
    # Required external worker command. The ROS2 node never links sherpa-onnx directly.
    backend.command: ""
    # One-shot inference args are kept for offline compatibility. Live profiles should
    # provide backend.stream_args so sherpa-onnx is loaded once and fed incrementally.
    # Empty YAML arrays are intentionally not declared here because ROS parameters cannot
    # infer their element type and report them as "not set" before backend validation.
    # One-shot args require {audio}; stream and health args forbid {audio}.
    backend.timeout_sec: 5.0
    backend.workspace_dir: "/tmp/fluent_audio_fa_kws"
    backend.cleanup_audio_files: true
    kws.max_active_paths: 32
    kws.num_trailing_blanks: 1
    kws.keywords_score: 1.0
    kws.keywords_threshold: 0.25

    # KWS keeps the model loaded and starts streaming only when VAD opens.
    # pre_roll keeps the phrase onset, hangover keeps trailing speech after
    # VAD falls, and merge_gap joins short VAD gaps.
    stream_gate.enabled: true
    stream_gate.pre_roll_ms: 500
    stream_gate.hangover_ms: 900
    stream_gate.merge_gap_ms: 400

    diagnostics.enabled: false
    debug.status_period_sec: 0.0
