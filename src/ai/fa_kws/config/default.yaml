fa_kws:
  ros__parameters:
    audio_topic: "audio/frame"
    expected_stream_id: "audio/raw/mic"
    output_topic: "voice/wake_word"
    # Required. Must match AudioFrame.source_id from the configured fa_in/source pipeline.
    expected_source_id: ""
    # Required backend id. Empty means startup fails closed until launch/profile config selects one.
    backend.name: ""

    target_sample_rate: 16000
    control.default_enabled: false
    control.inputs: ["speech_control"]
    control.speech_control.action: "topic"
    control.speech_control.topic: "voice/vad_state"
    control.speech_control.msg_type: "fa_interfaces/msg/VadState"
    control.speech_control.source_id: ""
    control.speech_control.stream_id: ""
    control.speech_control.probability_field: "probability"
    control.speech_control.probability_gate: 0.35
    control.speech_control.max_age_ms: 1000
    control.speech_control.qos.depth: 20
    control.speech_control.qos.reliable: false
    cooldown_ms: 1500
    audio.qos.depth: 10
    audio.qos.reliable: false
    output.qos.depth: 10
    output.qos.reliable: false

    # Local sherpa-onnx KWS model files. These are required; fa_kws fails closed
    # at startup if any path is empty or missing.
    model.encoder: ""
    model.decoder: ""
    model.joiner: ""
    model.tokens: ""
    kws.keywords_file: ""

    model.num_threads: 4
    # Required sherpa-onnx provider: cpu, cuda, or coreml. Empty means startup fails closed.
    backend.execution_provider: ""
    # Required external worker command. The ROS2 node never links sherpa-onnx directly.
    backend.command: ""
    # Required inference args. Profiles must provide this as a non-empty string-array.
    # Empty YAML arrays are intentionally not declared here because ROS parameters cannot
    # infer their element type and report them as "not set" before backend validation.
    # Required placeholders: {audio}, {encoder}, {decoder}, {joiner}, {tokens}, {keywords},
    # {provider}, {sample_rate}, {num_threads}, {max_active_paths},
    # {num_trailing_blanks}, {keywords_score}, {keywords_threshold}.
    # Required startup health-check args. Profiles must provide this as a non-empty
    # string-array with the same placeholders except {audio}, which is forbidden.
    backend.timeout_sec: 5.0
    backend.workspace_dir: "/tmp/fluent_audio_fa_kws"
    backend.cleanup_audio_files: true
    kws.max_active_paths: 32
    kws.num_trailing_blanks: 1
    kws.keywords_score: 1.0
    kws.keywords_threshold: 0.25

    debug.status_period_sec: 0.0
