system:
  default_start_delay: 0.2
  inter_group_delay: 0.5

groups:
  - id: io
    enable: true
    nodes:
      - id: fa_in
        enable: true
        package: fa_in
        exec: fa_in_node
        node_name: fa_in
        namespace: ""
        params_file: "${share:fa_in}/config/default.yaml"
        remappings: {}
        parameters: {}

      - id: fa_out
        enable: true
        package: fa_out
        exec: fa_out_node
        node_name: fa_out
        namespace: ""
        params_file: "${share:fa_out}/config/default.yaml"
        remappings: {}
        parameters: {}

  - id: format
    enable: true
    nodes:
      - id: fa_sample_format
        enable: true
        package: fa_sample_format
        exec: fa_sample_format_node
        node_name: fa_sample_format
        namespace: ""
        params_file: "${share:fa_sample_format}/config/default.yaml"
        remappings: {}
        parameters:
          input_topic: "audio/frame"
          output_topic: "audio/sample_format/mic"
          input_stream_id: "audio/raw/mic"
          output.stream_id: "audio/float32/mic"
          expected.sample_rate: 48000

      - id: fa_resample
        enable: true
        package: fa_resample
        exec: fa_resample_node
        node_name: fa_resample
        namespace: ""
        params_file: "${share:fa_resample}/config/default.yaml"
        remappings: {}
        parameters:
          mic.input_topic: "audio/sample_format/mic"
          mic.output_topic: "audio/resample16k/mic"
          mic.input_stream_id: "audio/float32/mic"
          mic.output.stream_id: "audio/preprocessed/mono16k"

      - id: fa_encode
        enable: false
        package: fa_encode
        exec: fa_encode_node
        node_name: fa_encode_mic
        namespace: ""
        params_file: "${share:fa_encode}/config/default.yaml"
        remappings: {}
        parameters:
          backend.command.executable: "${env:FLUENT_AUDIO_CODEC_ENCODER}"
          input_topic: "audio/resample16k/mic"
          output_topic: "audio/encoded/mic"
          input_stream_id: "audio/preprocessed/mono16k"
          output.stream_id: "audio/encoded/mic/opus"

      - id: fa_decode
        enable: false
        package: fa_decode
        exec: fa_decode_node
        node_name: fa_decode_mic
        namespace: ""
        params_file: "${share:fa_decode}/config/default.yaml"
        remappings: {}
        parameters:
          backend.command.executable: "${env:FLUENT_AUDIO_CODEC_DECODER}"
          input_topic: "audio/encoded/mic"
          output_topic: "audio/decoded/mic"
          input_stream_id: "audio/encoded/mic/opus"
          output.stream_id: "audio/decoded/mic/pcm16"

      - id: fa_resample_tts
        enable: false
        package: fa_resample
        exec: fa_resample_node
        node_name: fa_resample_tts
        namespace: ""
        params_file: "${share:fa_resample}/config/default.yaml"
        remappings: {}
        parameters:
          target_sample_rate: 48000
          mic.enabled: true
          mic.input_topic: "audio/tts/frame"
          mic.output_topic: "audio/tts/48k_float32"
          mic.input_stream_id: "tts_synthesis"
          mic.output.stream_id: "tts_synthesis_48k"
          ref.enabled: false

      - id: fa_sample_format_tts
        enable: false
        package: fa_sample_format
        exec: fa_sample_format_node
        node_name: fa_sample_format_tts
        namespace: ""
        params_file: "${share:fa_sample_format}/config/default.yaml"
        remappings: {}
        parameters:
          input_topic: "audio/tts/48k_float32"
          output_topic: "audio/tts/pcm16"
          input_stream_id: "tts_synthesis_48k"
          output.stream_id: "tts_playback_pcm16"
          input.encoding: "FLOAT32LE"
          input.bit_depth: 32
          output.encoding: "PCM16LE"
          output.bit_depth: 16
          expected.sample_rate: 48000
          expected.channels: 1
          expected.layout: "interleaved"

      - id: fa_bit_depth
        enable: false
        package: fa_bit_depth
        exec: fa_bit_depth_node
        node_name: fa_bit_depth
        namespace: ""
        params_file: "${share:fa_bit_depth}/config/default.yaml"
