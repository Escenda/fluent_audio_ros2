system:
  default_start_delay: 0.2
  inter_group_delay: 0.5

groups:
  - id: audio_io
    enable: true
    nodes:
      - id: fa_in_file_ja
        enable: true
        package: fa_in
        exec: fa_in_node
        node_name: fa_in
        namespace: ""
        params_file: "${share:fa_in}/config/default.yaml"
        remappings: {}
        parameters:
          backend.name: "pcm_file_reader"
          file.path: "${env:FLUENT_AUDIO_FILE_JA_PCM_PATH}"
          output_topic: "audio/file_source/frame"
          audio.source_id: "file_ja"
          audio.sample_rate: 48000
          audio.channels: 1
          audio.encoding: "PCM16LE"
          audio.bit_depth: 16
          audio.layout: "interleaved"
          audio.chunk_ms: 20
          audio.stream_id: "audio/stream/file_ja/raw_pcm16_48k"
          playback.loop: false
          startup.required_subscribers: 1
          startup.subscriber_wait_timeout_ms: 10000

  - id: audio_format
    enable: true
    nodes:
      - id: fa_sample_format_file_ja
        enable: true
        package: fa_sample_format
        exec: fa_sample_format_node
        node_name: fa_sample_format_file_ja
        namespace: ""
        params_file: "${share:fa_sample_format}/config/default.yaml"
        remappings: {}
        parameters:
          input_topic: "audio/file_source/frame"
          output_topic: "audio/sample_format/file_ja"
          input_stream_id: "audio/stream/file_ja/raw_pcm16_48k"
          input.encoding: "PCM16LE"
          input.bit_depth: 16
          output.stream_id: "audio/stream/file_ja/float32_48k"
          output.encoding: "FLOAT32LE"
          output.bit_depth: 32
          expected.sample_rate: 48000
          expected.channels: 1
          expected.layout: "interleaved"

      - id: fa_resample_file_ja
        enable: true
        package: fa_resample
        exec: fa_resample_node
        node_name: fa_resample_file_ja
        namespace: ""
        params_file: "${share:fa_resample}/config/default.yaml"
        remappings: {}
        parameters:
          target_sample_rate: 16000
          mic.input_topic: "audio/sample_format/file_ja"
          mic.output_topic: "audio/resample16k/file_ja"
          mic.input_stream_id: "audio/stream/file_ja/float32_48k"
          mic.output.stream_id: "audio/stream/file_ja/float32_16k"

  - id: audio_correction
    enable: true
    nodes:
      - id: fa_dc_offset_removal_file_ja
        enable: true
        package: fa_dc_offset_removal
        exec: fa_dc_offset_removal_node
        node_name: fa_dc_offset_removal_file_ja
        namespace: ""
        params_file: "${share:fa_dc_offset_removal}/config/default.yaml"
        remappings: {}
        parameters:
          input_topic: "audio/resample16k/file_ja"
          output_topic: "audio/dc_offset_removed/file_ja/frame"
          input_stream_id: "audio/stream/file_ja/float32_16k"
          output.stream_id: "audio/stream/file_ja/dc_offset_removed"
          expected.sample_rate: 16000
          expected.channels: 1
          expected.encoding: "FLOAT32LE"
          expected.bit_depth: 32
          expected.layout: "interleaved"

  - id: audio_frequency
    enable: true
    nodes:
      - id: fa_high_pass_file_ja
        enable: true
        package: fa_high_pass
        exec: fa_high_pass_node
        node_name: fa_high_pass_file_ja
        namespace: ""
        params_file: "${share:fa_high_pass}/config/default.yaml"
        remappings: {}
        parameters:
          input_topic: "audio/dc_offset_removed/file_ja/frame"
          output_topic: "audio/high_pass/file_ja/frame"
          input_stream_id: "audio/stream/file_ja/dc_offset_removed"
          output.stream_id: "audio/stream/file_ja/high_pass"
          filter.cutoff_hz: 80.0
          expected.sample_rate: 16000
          expected.channels: 1
          expected.encoding: "FLOAT32LE"
          expected.bit_depth: 32
          expected.layout: "interleaved"

  - id: voice_frontend
    enable: true
    nodes:
      - id: fa_vad_file_ja
        enable: true
        package: fa_vad
        exec: fa_vad_node
        node_name: fa_vad
        namespace: ""
        params_file: "${share:fa_vad}/config/default.yaml"
        remappings: {}
        parameters:
          input_topic: "audio/high_pass/file_ja/frame"
          input_stream_id: "audio/stream/file_ja/high_pass"
          output_topic: "voice/file_ja/vad"
          vad_state_topic: "voice/file_ja/vad_state"
          expected_source_id: "file_ja"
          backend.name: "silero"
          backend.model_path: "${env:FLUENT_AUDIO_VAD_MODEL_DIR}"
          backend.execution_provider: "${env:FLUENT_AUDIO_VAD_PROVIDER}"
          backend.command: "${env:FLUENT_AUDIO_VAD_WORKER}"

      - id: fa_asr_file_ja
        enable: true
        package: fa_asr
        exec: fa_asr_node
        node_name: fa_asr_file_ja
        namespace: ""
        params_file: "${share:fa_asr}/config/default.yaml"
        remappings: {}
        parameters:
          audio_topic: "audio/high_pass/file_ja/frame"
          expected_source_id: "file_ja"
          expected_stream_id: "audio/stream/file_ja/high_pass"
          control.default_enabled: false
          control.inputs: ["speech_control"]
          control.speech_control.action: "topic"
          control.speech_control.topic: "voice/file_ja/vad_state"
          control.speech_control.msg_type: "fa_interfaces/msg/VadState"
          control.speech_control.source_id: "file_ja"
          control.speech_control.stream_id: "audio/stream/file_ja/high_pass"
          control.speech_control.active_field: "is_speech"
          control.speech_control.start_field: "start"
          control.speech_control.end_field: "end"
          control.speech_control.open_on: "start_or_active_rising"
          control.speech_control.close_on: "end_or_active_falling"
          control.speech_control.submit_on_close: true
          control.speech_control.pre_roll_ms: 0.0
          control.speech_control.post_roll_ms: 0.0
          control.speech_control.qos.depth: 50
          control.speech_control.qos.reliable: false
          turn_context_topic: "conversation/file_ja/turn_context"
          asr_result_topic: "voice/file_ja/asr/result"
          timeline.retention_sec: 1800.0
          timeline.timestamp_alignment_tolerance_ms: 5.0
          timeline.clock: "media"
          timeline.window_id: "file_ja_voice_frontend_asr"
          timeline.window_epoch: 1
          backend.name: "parakeet_multilingual_buffered"
          backend.model_path: "${env:FLUENT_AUDIO_ASR_MODEL_PATH}"
          backend.language: ""
          backend.language_policy: "auto_detect"
          backend.sample_rate_hz: 16000
          backend.channels: 1
          backend.chunk_size_samples: 1600
          backend.chunk_ms: 0
          backend.emit_partial: false
          backend.max_partial_interval_ms: 300
          backend.max_buffer_sec: 30.0
          backend.speech_energy_threshold: 0.001
          workspace_dir: "/tmp/fluent_audio/fa_asr/file_ja_voice_frontend"
          cleanup_audio_files: true
          result.qos.depth: 10
          result.qos.reliable: true
