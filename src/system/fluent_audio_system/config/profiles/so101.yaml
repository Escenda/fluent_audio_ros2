system:
  default_start_delay: 0.2
  inter_group_delay: 0.5

groups:
  - id: audio_io
    enable: true
    nodes:
      - id: fa_in
        enable: true
        package: fa_in
        exec: fa_in_node
        node_name: fa_in
        namespace: ""
        params_file: "${share:fa_in}/config/default.yaml"
        remappings: {}
        parameters: {}

      - id: fa_out
        enable: true
        package: fa_out
        exec: fa_out_node
        node_name: fa_out
        namespace: ""
        params_file: "${share:fa_out}/config/default.yaml"
        remappings: {}
        parameters: {}

  - id: audio_format
    enable: false
    nodes:
      - id: fa_sample_format
        enable: true
        package: fa_sample_format
        exec: fa_sample_format_node
        node_name: fa_sample_format_mic
        namespace: ""
        params_file: "${share:fa_sample_format}/config/default.yaml"
        remappings: {}
        parameters:
          input_topic: "audio/frame"
          output_topic: "audio/sample_format/mic"
          input_stream_id: "audio/raw/mic"
          output.stream_id: "audio/float32/mic"
          expected.sample_rate: 48000

      - id: fa_resample
        enable: true
        package: fa_resample
        exec: fa_resample_node
        node_name: fa_resample
        namespace: ""
        params_file: "${share:fa_resample}/config/default.yaml"
        remappings: {}
        parameters:
          mic.input_topic: "audio/sample_format/mic"
          mic.output_topic: "audio/resample16k/mic"
          mic.input_stream_id: "audio/float32/mic"
          mic.output.stream_id: "audio/preprocessed/mono16k"

  - id: audio_correction
    enable: true
    nodes:
      - id: fa_aec_linear
        enable: false
        package: fa_aec_linear
        exec: fa_aec_linear_node
        node_name: fa_aec_linear
        namespace: ""
        params_file: "${share:fa_aec_linear}/config/default.yaml"
        remappings: {}
        parameters: {}

      - id: fa_aec_nn
        enable: false
        package: fa_aec_nn
        exec: fa_aec_nn_node
        node_name: fa_aec_nn
        namespace: ""
        params_file: "${share:fa_aec_nn}/config/default.yaml"
        remappings: {}
        parameters: {}

      - id: fa_denoise
        enable: false
        package: fa_denoise
        exec: fa_denoise_node
        node_name: fa_denoise
        namespace: ""
        params_file: "${share:fa_denoise}/config/default.yaml"
        remappings: {}
        parameters:
          dtln.model_1_path: "${share:fa_denoise}/models/model_1.onnx"
          dtln.model_2_path: "${share:fa_denoise}/models/model_2.onnx"

  - id: ai
    enable: true
    nodes:
      - id: fa_vad
        enable: false
        package: fa_vad
        exec: fa_vad_node
        node_name: fa_vad
        namespace: ""
        params_file: "${share:fa_vad}/config/default.yaml"
        remappings: {}
        parameters:
          input_topic: "audio/resample16k/mic"
          input_stream_id: "audio/preprocessed/mono16k"
          backend.name: "silero"
          backend.model_path: "${env:FLUENT_AUDIO_VAD_MODEL_DIR}"
          backend.execution_provider: "${env:FLUENT_AUDIO_VAD_PROVIDER}"
          backend.command: "${env:FLUENT_AUDIO_VAD_WORKER}"

      - id: fa_kws
        enable: false
        package: fa_kws
        exec: fa_kws_node
        node_name: fa_kws
        namespace: ""
        params_file: "${share:fa_kws}/config/default.yaml"
        remappings: {}
        parameters:
          audio_topic: "audio/resample16k/mic"
          expected_stream_id: "audio/preprocessed/mono16k"
          vad_topic: "voice/vad_state"
          output_topic: "voice/wake_word"
          backend.name: "sherpa_onnx_kws"
          backend.execution_provider: "${env:FLUENT_AUDIO_KWS_PROVIDER}"
          backend.command: "${env:FLUENT_AUDIO_KWS_WORKER}"
          backend.args:
            - "detect"
            - "--audio"
            - "{audio}"
            - "--encoder"
            - "{encoder}"
            - "--decoder"
            - "{decoder}"
            - "--joiner"
            - "{joiner}"
            - "--tokens"
            - "{tokens}"
            - "--keywords"
            - "{keywords}"
            - "--provider"
            - "{provider}"
            - "--sample-rate"
            - "{sample_rate}"
            - "--num-threads"
            - "{num_threads}"
            - "--max-active-paths"
            - "{max_active_paths}"
            - "--num-trailing-blanks"
            - "{num_trailing_blanks}"
            - "--keywords-score"
            - "{keywords_score}"
            - "--keywords-threshold"
            - "{keywords_threshold}"
          backend.health_args:
            - "health"
            - "--encoder"
            - "{encoder}"
            - "--decoder"
            - "{decoder}"
            - "--joiner"
            - "{joiner}"
            - "--tokens"
            - "{tokens}"
            - "--keywords"
            - "{keywords}"
            - "--provider"
            - "{provider}"
            - "--sample-rate"
            - "{sample_rate}"
            - "--num-threads"
            - "{num_threads}"
            - "--max-active-paths"
            - "{max_active_paths}"
            - "--num-trailing-blanks"
            - "{num_trailing_blanks}"
            - "--keywords-score"
            - "{keywords_score}"
            - "--keywords-threshold"
            - "{keywords_threshold}"
          backend.timeout_sec: 5.0
          backend.workspace_dir: "/tmp/fluent_audio/fa_kws/so101"
          backend.cleanup_audio_files: true
          output.qos.depth: 10
          output.qos.reliable: false
          model.encoder: "${env:FLUENT_AUDIO_KWS_ENCODER}"
          model.decoder: "${env:FLUENT_AUDIO_KWS_DECODER}"
          model.joiner: "${env:FLUENT_AUDIO_KWS_JOINER}"
          model.tokens: "${env:FLUENT_AUDIO_KWS_TOKENS}"
          kws.keywords_file: "${env:FLUENT_AUDIO_KWS_KEYWORDS}"
          model.num_threads: 4
          kws.max_active_paths: 32
          kws.num_trailing_blanks: 1
          kws.keywords_score: 1.0
          kws.keywords_threshold: 0.25

      - id: fa_asr
        enable: false
        package: fa_asr
        exec: fa_asr_node
        node_name: fa_asr
        namespace: ""
        params_file: "${share:fa_asr}/config/default.yaml"
        remappings: {}
        parameters:
          audio_topic: "audio/resample16k/mic"
          expected_stream_id: "audio/preprocessed/mono16k"
          vad_topic: "voice/vad_state"
          turn_context_topic: "conversation/turn_context"
          asr_result_topic: "voice/asr/result"
          backend.name: "whisper.cpp"
          backend.model_path: "${env:FLUENT_AUDIO_ASR_MODEL_PATH}"
          backend.command: "${env:FLUENT_AUDIO_ASR_WORKER}"
          backend.args:
            - "transcribe"
            - "--audio"
            - "{audio}"
            - "--model"
            - "{model}"
            - "--sample-rate"
            - "{sample_rate}"
            - "--language"
            - "{language}"
          backend.health_args:
            - "health"
            - "--model"
            - "{model}"
            - "--language"
            - "{language}"
          backend.timeout_sec: 120.0
          workspace_dir: "/tmp/fluent_audio/fa_asr/so101"
          cleanup_audio_files: true
          result.qos.depth: 10
          result.qos.reliable: true

      - id: fa_audio_embedding
        enable: false
        package: fa_audio_embedding
        exec: fa_audio_embedding_node
        node_name: fa_audio_embedding
        namespace: ""
        params_file: "${share:fa_audio_embedding}/config/default.yaml"
        remappings: {}
        parameters:
          input_topic: "audio/resample16k/mic"
          expected_stream_id: "audio/preprocessed/mono16k"

      - id: fa_turn_detector
        enable: false
        package: fa_turn_detector
        exec: fa_turn_detector_node
        node_name: fa_turn_detector
        namespace: ""
        params_file: "${share:fa_turn_detector}/config/default.yaml"
        remappings: {}
        parameters:
          audio_topic: "audio/resample16k/mic"
          expected_stream_id: "audio/preprocessed/mono16k"
          vad_topic: "voice/vad_state"
          turn_context_topic: "conversation/turn_context"
          output_topic: "voice/turn_end"
          backend.name: "smart_turn_onnx"
          backend.model_path: "${env:FLUENT_AUDIO_TURN_DETECTOR_MODEL}"
          backend.execution_provider: "${env:FLUENT_AUDIO_TURN_DETECTOR_PROVIDER}"
          backend.command: "${env:FLUENT_AUDIO_TURN_DETECTOR_WORKER}"
          backend.args:
            - "detect"
            - "--model"
            - "{model}"
            - "--provider"
            - "{provider}"
            - "--audio"
            - "{audio}"
          backend.health_args:
            - "health"
            - "--model"
            - "{model}"
            - "--provider"
            - "{provider}"
          backend.timeout_sec: 5.0
          backend.workspace_dir: "/tmp/fluent_audio/fa_turn_detector/so101"
          backend.cleanup_audio_files: true
          backend.threshold: 0.5
          output.qos.depth: 10
          output.qos.reliable: true
