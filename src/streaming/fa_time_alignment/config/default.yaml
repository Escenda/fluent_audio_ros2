fa_time_alignment:
  ros__parameters:
    input_topic: "fa_time_alignment/input"
    output_topic: "fa_time_alignment/output"
    input_stream_id: "audio/frame_buffer/mic"

    output:
      stream_id: "audio/time_aligned/mic"

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    alignment:
      period_ms: 20.0
      phase_ms: 0.0
      max_adjust_ms: 2.0

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
