fa_packet_loss_concealment_node:
  ros__parameters:
    input_topic: "audio/stream/input"
    output_topic: "audio/stream/plc"
    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"
    plc:
      max_gap_frames: 3
      attenuation_per_gap: 0.7
