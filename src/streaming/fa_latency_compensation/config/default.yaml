fa_latency_compensation:
  ros__parameters:
    input_topic: "audio/frame"
    output_topic: "audio/latency_compensated/frame"
    input_stream_id: "audio/preprocessed/mono16k"

    compensation:
      offset_ms: 0.0

    output:
      stream_id: "audio/latency_compensated/mono16k"

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
