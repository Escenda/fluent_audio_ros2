fa_jitter_buffer_node:
  ros__parameters:
    input_topic: "fa_jitter_buffer/input"
    output_topic: "fa_jitter_buffer/output"
    input_stream_id: "audio/network/mic"

    output:
      stream_id: "audio/jitter_buffered/mic"

    expected:
      sample_rate: 16000
      channels: 1
      encoding: "FLOAT32LE"
      bit_depth: 32
      layout: "interleaved"

    jitter:
      target_depth_frames: 2
      max_depth_frames: 8
      reset_on_epoch_regression: false

    qos:
      depth: 10
      reliable: false

    diagnostics:
      publish_period_ms: 1000
      qos:
        depth: 10
        reliable: true
