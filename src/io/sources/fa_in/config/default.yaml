fa_in:
  ros__parameters:
    backend.name: "alsa_capture"
    output_topic: "fa_in/output"
    audio:
      device_selector:
        mode: "id"          # id | index | name
        identifier: ""      # e.g., "hw:CARD=Device,DEV=0"; required when mode is id/name
        index: -1
      sample_rate: 48000
      channels: 1
      bit_depth: 16           # PCM16LE=16, PCM32LE/FLOAT32LE=32
      chunk_ms: 20
      encoding: "PCM16LE"     # PCM16LE | PCM32LE | FLOAT32LE
      stream_id: "audio/raw/mic"
      layout: "interleaved"
      qos:
        depth: 10
        reliable: false
    startup:
      required_subscribers: 0
      subscriber_wait_timeout_ms: 0
    diagnostics:
      qos:
        depth: 10
        reliable: false
      publish_period_ms: 1000
