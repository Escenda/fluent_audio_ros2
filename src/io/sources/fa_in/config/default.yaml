fa_in:
  ros__parameters:
    backend.name: "alsa_capture"
    audio:
      device_selector:
        mode: "id"          # id | index | name
        identifier: ""      # e.g., "hw:CARD=Device,DEV=0"; required when mode is id/name
        index: -1
      sample_rate: 48000
      channels: 1
      bit_depth: 16           # PCM16LE=16, PCM32LE/FLOAT32LE=32
      chunk_ms: 20
      encoding: "PCM16LE"     # PCM16LE | PCM32LE | FLOAT32LE
      stream_id: "audio/frame"
      layout: "interleaved"
    diagnostics:
      publish_period_ms: 1000
